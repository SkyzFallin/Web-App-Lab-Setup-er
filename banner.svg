<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="180" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="760" height="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="0" y="178" width="760" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Subtle grid (lab feel) -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="36" x2="760" y2="36"/>
    <line x1="0" y1="72" x2="760" y2="72"/>
    <line x1="0" y1="108" x2="760" y2="108"/>
    <line x1="0" y1="144" x2="760" y2="144"/>
  </g>

  <!-- Lab flask / beaker icon -->
  <g transform="translate(90, 88)" filter="url(#glow)">
    <!-- Flask neck -->
    <rect x="-6" y="-42" width="12" height="20" rx="2" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <!-- Flask body (conical) -->
    <path d="M-6,-22 L-28,30 L28,30 L6,-22" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linejoin="round"/>
    <!-- Liquid inside -->
    <path d="M-18,12 L-28,30 L28,30 L18,12" fill="#58a6ff" opacity="0.15"/>
    <!-- Bubbles -->
    <circle cx="-5" cy="18" r="3" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
    <circle cx="8" cy="22" r="2" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>
    <circle cx="2" cy="10" r="1.5" fill="#58a6ff" opacity="0.4"/>
    <!-- Docker whale overlay (small) -->
    <g transform="translate(28, -20)" opacity="0.4">
      <rect x="0" y="0" width="4" height="4" rx="0.5" fill="#58a6ff"/>
      <rect x="5" y="0" width="4" height="4" rx="0.5" fill="#58a6ff"/>
      <rect x="0" y="-5" width="4" height="4" rx="0.5" fill="#58a6ff"/>
      <rect x="5" y="-5" width="4" height="4" rx="0.5" fill="#58a6ff"/>
      <rect x="10" y="-5" width="4" height="4" rx="0.5" fill="#58a6ff"/>
      <path d="M-4,6 C-4,6 0,8 8,8 C16,8 18,4 18,4" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Accent divider -->
  <line x1="155" y1="40" x2="155" y2="145" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>

  <!-- Faded target list (right side) -->
  <g font-family="'Courier New', Courier, monospace" font-size="9" fill="#58a6ff" opacity="0.1">
    <text x="600" y="40">DVWA ........... UP</text>
    <text x="600" y="54">Juice Shop ..... UP</text>
    <text x="600" y="68">WebGoat ........ UP</text>
    <text x="600" y="82">bWAPP .......... UP</text>
    <text x="600" y="96">Mutillidae ..... UP</text>
    <text x="600" y="110">HackTheBox ..... UP</text>
    <text x="600" y="124">Nikto .......... RDY</text>
    <text x="600" y="138">SQLMap ......... RDY</text>
    <text x="600" y="152">Burp Suite ..... RDY</text>
  </g>

  <!-- Title -->
  <text x="170" y="62" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold" fill="#58a6ff" filter="url(#glow)">Web-App-Lab-Setup-er</text>

  <!-- Subtitle -->
  <text x="172" y="90" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">0 to pentest lab in one command</text>

  <!-- Description -->
  <text x="172" y="115" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">Docker targets  ·  Scanning tools  ·  Wordlists  ·  Automated setup</text>

  <!-- Badges -->
  <g font-family="'Courier New', Courier, monospace" font-size="9.5" font-weight="700">
    <rect x="172" y="128" width="42" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="193" y="140" fill="#58a6ff" text-anchor="middle">bash</text>
    <rect x="220" y="128" width="52" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="246" y="140" fill="#6b7280" text-anchor="middle">docker</text>
    <rect x="278" y="128" width="52" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="304" y="140" fill="#6b7280" text-anchor="middle">pentest</text>
    <rect x="336" y="128" width="64" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="368" y="140" fill="#6b7280" text-anchor="middle">wordlists</text>
  </g>

  <!-- Author -->
  <text x="172" y="166" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">SkyzFallin</text>
</svg>
